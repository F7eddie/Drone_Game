<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drone Delivery</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #unity-container {
            width: 100%;
            height: 100%;
            position: relative;
            max-width: 1920px;
            max-height: 1080px;
        }
        #unity-canvas {
            width: 100%;
            height: 100%;
            background: #000;
            display: block;
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
        #start-overlay h1 {
            font-size: 3.2em;
            margin-bottom: 8px;
        }
        #start-overlay p {
            font-size: 1.3em;
            margin-bottom: 40px;
            opacity: 0.85;
        }
        #start-btn {
            padding: 20px 55px;
            font-size: 1.7em;
            background: #00aaff;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 170, 255, 0.5);
            transition: all 0.2s ease;
        }
        #start-btn:hover {
            background: #0088cc;
            transform: scale(1.05);
        }
        #loading-container {
            width: 320px;
            margin-top: 25px;
            display: none;
        }
        #loading-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }
        #loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #00aaff, #00ffaa);
            transition: width 0.15s ease;
        }
        #status {
            margin-top: 12px;
            font-size: 1.15em;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width="1920" height="1080"></canvas>
        
        <!-- Fullscreen + Load Popup -->
        <div id="start-overlay">
            <h1>Drone Delivery</h1>
            <p>by F7eddie</p>
            
            <button id="start-btn">Play in Fullscreen</button>
            
            <div id="loading-container">
                <div id="loading-bar"><div id="loading-bar-fill"></div></div>
                <div id="status">Click the button above to start</div>
            </div>
        </div>
    </div>

    <script>
        // ==================== UPDATE THESE FILENAMES ====================
        // Go to your Build folder and copy the exact filenames Unity created
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/DroneDelivery.loader.js";        // ← CHANGE THIS
        var dataUrl   = buildUrl + "/DroneDelivery.data";             // ← CHANGE THIS
        var frameworkUrl = buildUrl + "/DroneDelivery.framework.js";  // ← CHANGE THIS
        var codeUrl   = buildUrl + "/DroneDelivery.wasm";             // ← CHANGE THIS (or .js)
        // ================================================================

        var canvas = document.getElementById("unity-canvas");
        var overlay = document.getElementById("start-overlay");
        var startBtn = document.getElementById("start-btn");
        var loadingContainer = document.getElementById("loading-container");
        var loadingFill = document.getElementById("loading-bar-fill");
        var statusText = document.getElementById("status");

        var unityInstance = null;

        startBtn.addEventListener("click", function () {
            // 1. Enter fullscreen immediately
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen().catch(() => {});
            } else if (canvas.webkitRequestFullscreen) {
                canvas.webkitRequestFullscreen();
            } else if (canvas.msRequestFullscreen) {
                canvas.msRequestFullscreen();
            }

            // 2. Hide button and show loading
            startBtn.style.display = "none";
            loadingContainer.style.display = "block";
            statusText.innerText = "Entering fullscreen & loading game...";

            // 3. Load and start the Unity game
            var script = document.createElement("script");
            script.src = loaderUrl;

            script.onload = function () {
                var config = {
                    dataUrl: dataUrl,
                    frameworkUrl: frameworkUrl,
                    codeUrl: codeUrl,
                    streamingAssetsUrl: "StreamingAssets",
                    companyName: "F7eddie",
                    productName: "Drone Delivery",
                    productVersion: "1.0",
                };

                createUnityInstance(canvas, config, function (progress) {
                    // Update progress bar
                    loadingFill.style.width = (progress * 100) + "%";
                    statusText.innerText = "Loading game... " + Math.floor(progress * 100) + "%";
                }).then(function (instance) {
                    unityInstance = instance;
                    // Game is ready → hide overlay completely
                    overlay.style.display = "none";
                }).catch(function (error) {
                    statusText.innerText = "Failed to load. Check browser console (F12).";
                    console.error("Unity load error:", error);
                });
            };

            script.onerror = function () {
                statusText.innerText = "Could not load game files. Check that filenames are correct.";
            };

            document.body.appendChild(script);
        });

        // Optional: Show a hint on page load
        window.onload = function () {
            statusText.innerText = "Ready when you are!";
        };
    </script>
</body>
</html>
