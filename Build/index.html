<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        .heading-font {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
            letter-spacing: -0.03em;
        }
        .unity-canvas-wrapper {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
            border: 1px solid #334155;
        }
        .fullscreen-buffer {
            padding: 3cm;
            box-sizing: border-box;
            background: #000;
        }
        .fullscreen-buffer #unity-canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="max-w-[1100px] mx-auto px-6 pt-16 pb-12">
        
        <!-- Title + Description -->
        <div class="text-center mb-10">
            <h1 class="text-7xl md:text-8xl font-semibold tracking-tighter heading-font mb-4">
                Drone Delivery
            </h1>
            <p class="text-xl text-slate-400 max-w-md mx-auto">
                A precision drone simulation by F7eddie.<br>
                Master the skies and deliver with care.
            </p>
        </div>

        <!-- Play Area -->
        <div class="max-w-[1100px] mx-auto">
            
            <!-- Game Container -->
            <div id="game-wrapper" class="hidden unity-canvas-wrapper rounded-3xl overflow-hidden border border-slate-700 bg-black">
                <div id="unity-container" class="relative w-full aspect-video">
                    <canvas id="unity-canvas" width="1920" height="1080" class="w-full h-full"></canvas>
                    
                    <!-- Start Overlay -->
                    <div id="start-overlay" class="absolute inset-0 bg-black/90 flex items-center justify-center z-50">
                        <div class="text-center px-8">
                            <h3 class="text-4xl font-semibold mb-3">Ready to fly?</h3>
                            <p class="text-slate-400 mb-8">Click below to launch in fullscreen</p>
                            
                            <button id="start-btn"
                                    class="px-10 py-4 bg-white text-slate-900 hover:bg-slate-100 active:scale-[0.985] transition-all font-semibold rounded-3xl text-xl flex items-center gap-x-3 mx-auto shadow-2xl">
                                <span>Play in Fullscreen</span>
                                <i class="fa-solid fa-play ml-1"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Pause Overlay -->
                    <div id="pause-overlay" class="hidden absolute inset-0 bg-black/95 z-[60] flex items-center justify-center">
                        <div class="text-center px-6">
                            <h3 class="text-5xl font-semibold mb-3">Game Paused</h3>
                            <p class="text-xl text-slate-400 mb-8">You exited fullscreen</p>
                            
                            <button id="resume-btn"
                                    class="px-10 py-4 bg-sky-500 hover:bg-sky-600 transition-all text-white font-semibold rounded-3xl text-xl flex items-center gap-x-3 mx-auto">
                                <span>Return to Fullscreen</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Launch Button -->
            <div id="play-prompt" class="text-center mt-8">
                <button onclick="launchGame()" 
                        class="group px-14 py-5 bg-white hover:bg-slate-100 active:scale-[0.985] transition-all text-slate-900 font-semibold rounded-3xl text-2xl flex items-center gap-x-4 mx-auto shadow-2xl shadow-white/10">
                    <span>Play Drone Delivery</span>
                    <i class="fa-solid fa-arrow-right group-active:translate-x-1 transition-transform"></i>
                </button>
                <p class="mt-4 text-sm text-slate-500">Best experienced in fullscreen • Desktop recommended</p>
            </div>

        </div>
    </div>

    <script>
        // Tailwind
        function initTailwind() {
            // Already handled by CDN
        }

        let unityInstance = null;

        function launchGame() {
            const prompt = document.getElementById('play-prompt');
            const wrapper = document.getElementById('game-wrapper');
            
            prompt.style.display = 'none';
            wrapper.style.display = 'block';
            wrapper.classList.remove('hidden');
            
            // Scroll smoothly to game
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function initializeGame() {
            const canvas = document.getElementById("unity-canvas");
            const container = document.getElementById("unity-container");
            const startOverlay = document.getElementById("start-overlay");
            const startBtn = document.getElementById("start-btn");
            const pauseOverlay = document.getElementById("pause-overlay");
            const resumeBtn = document.getElementById("resume-btn");

            const buildUrl = "Build";
            const loaderUrl = buildUrl + "/a928705433bd28c0cf588e497698ea8f.loader.js";

            const config = {
                dataUrl: buildUrl + "/7c2e535a2bae0b6af448127da25c9006.data.unityweb",
                frameworkUrl: buildUrl + "/c567148f20765437f74d711b26459f12.framework.js.unityweb",
                codeUrl: buildUrl + "/64adc74bc694812e239c8346655a7a79.wasm.unityweb",
                streamingAssetsUrl: "StreamingAssets",
                companyName: "DefaultCompany",
                productName: "Drone_Delivery",
                productVersion: "1.0",
            };

            // Desktop size
            if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                canvas.style.width = "1920px";
                canvas.style.height = "1080px";
            }

            // Fullscreen + 3cm buffer + pause logic
            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement) {
                    container.classList.add('fullscreen-buffer');
                    pauseOverlay.style.display = "none";
                } else {
                    container.classList.remove('fullscreen-buffer');
                    pauseOverlay.style.display = "flex";
                }
            });

            // Resume button
            resumeBtn.addEventListener("click", () => {
                if (canvas.requestFullscreen) {
                    canvas.requestFullscreen();
                } else if (canvas.webkitRequestFullscreen) {
                    canvas.webkitRequestFullscreen();
                } else if (canvas.msRequestFullscreen) {
                    canvas.msRequestFullscreen();
                }
            });

            // Start button - loads the game
            startBtn.addEventListener("click", function () {
                startBtn.style.display = "none";
                startOverlay.style.background = 'rgba(0,0,0,0.7)';

                const script = document.createElement("script");
                script.src = loaderUrl;

                script.onload = () => {
                    createUnityInstance(canvas, config, (progress) => {
                        // Progress can be added here if needed
                    }).then((instance) => {
                        unityInstance = instance;
                        startOverlay.style.display = "none";
                    }).catch((error) => {
                        console.error("Failed to load game:", error);
                        alert("Failed to load the game. Please check the console.");
                    });
                };

                script.onerror = () => {
                    alert("Could not load game files. Make sure the Build folder is in the same directory.");
                };

                document.body.appendChild(script);
            });
        }

        function init() {
            initTailwind();
            initializeGame();
        }

        window.onload = init;
    </script>
</body>
</html>
