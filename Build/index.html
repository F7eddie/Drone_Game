<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{{ PRODUCT_NAME }}}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #unity-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #unity-canvas {
            width: 100%;
            height: 100%;
            background: #000;
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }
        #start-overlay h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        #start-btn {
            padding: 15px 40px;
            font-size: 1.5em;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #start-btn:hover {
            background: #0056b3;
        }
        #loading {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <canvas id="unity-canvas" width="1920" height="1080"></canvas>
        
        <!-- Start Fullscreen Overlay -->
        <div id="start-overlay">
            <h1>{{{ PRODUCT_NAME }}}</h1>
            <button id="start-btn">Play in Fullscreen</button>
            <div id="loading">Loading game... Please wait.</div>
        </div>
    </div>

    <script>
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
        var config = {
            dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
            frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
            codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "{{{ COMPANY_NAME }}}",
            productName: "{{{ PRODUCT_NAME }}}",
            productVersion: "{{{ PRODUCT_VERSION }}}",
            showBanner: function (msg, type) { /* optional banner handling */ }
        };

        var unityInstance = null;

        // Start button handler
        document.getElementById("start-btn").addEventListener("click", function () {
            var btn = this;
            var overlay = document.getElementById("start-overlay");
            var loading = document.getElementById("loading");
            
            btn.style.display = "none";
            loading.style.display = "block";

            // Enter fullscreen
            var canvas = document.getElementById("unity-canvas");
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen().catch(console.warn);
            } else if (canvas.webkitRequestFullscreen) {
                canvas.webkitRequestFullscreen();
            } else if (canvas.msRequestFullscreen) {
                canvas.msRequestFullscreen();
            }

            // Load Unity (if not already loaded)
            if (!unityInstance) {
                var script = document.createElement("script");
                script.src = loaderUrl;
                script.onload = function () {
                    createUnityInstance(canvas, config, (progress) => {
                        // Progress callback if needed
                    }).then((instance) => {
                        unityInstance = instance;
                        overlay.style.display = "none"; // Hide overlay once loaded
                    }).catch(console.error);
                };
                document.body.appendChild(script);
            } else {
                overlay.style.display = "none";
            }
        });
    </script>
</body>
</html>
