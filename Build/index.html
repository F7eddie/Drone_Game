<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | Drone_Delivery</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      /* 3cm buffer in fullscreen */
      #unity-container.fullscreen-buffer {
        padding: 3cm;
        box-sizing: border-box;
        background: #000;
      }
      #unity-container.fullscreen-buffer #unity-canvas {
        width: 100% !important;
        height: 100% !important;
      }

      /* Pause overlay (no Unity changes) */
      #pause-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 300;
        text-align: center;
        color: white;
      }
      #pause-overlay h2 {
        font-size: 3em;
        margin-bottom: 20px;
      }
      #resume-btn {
        padding: 20px 50px;
        font-size: 1.6em;
        background: #00aaff;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 170, 255, 0.5);
      }
      #resume-btn:hover {
        background: #0088cc;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

      <div id="unity-loading-bar" style="display: none;">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>

      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Drone_Delivery</div>
      </div>

      <!-- Start Overlay -->
      <div id="start-overlay">
        <h1>Drone Delivery</h1>
        <p>by F7eddie</p>
        <button id="start-btn">Play in Fullscreen</button>
        <div id="custom-loading" style="display:none; width:300px; margin-top:25px;">
          <div style="width:100%; height:10px; background:#333; border-radius:5px; overflow:hidden;">
            <div id="custom-progress-fill" style="height:100%; width:0%; background:#00aaff; transition:width 0.2s;"></div>
          </div>
          <div id="custom-status" style="margin-top:12px; font-size:1.1em;">Click the button to start</div>
        </div>
      </div>

      <!-- Pause Overlay (visual only - no Unity changes) -->
      <div id="pause-overlay">
        <h2>Game Paused</h2>
        <p>You exited fullscreen</p>
        <button id="resume-btn">Return to Fullscreen</button>
      </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");
      var container = document.getElementById("unity-container");
      var startOverlay = document.getElementById("start-overlay");
      var startBtn = document.getElementById("start-btn");
      var pauseOverlay = document.getElementById("pause-overlay");
      var resumeBtn = document.getElementById("resume-btn");

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/a928705433bd28c0cf588e497698ea8f.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/7c2e535a2bae0b6af448127da25c9006.data.unityweb",
        frameworkUrl: buildUrl + "/c567148f20765437f74d711b26459f12.framework.js.unityweb",
        codeUrl: buildUrl + "/64adc74bc694812e239c8346655a7a79.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Drone_Delivery",
        productVersion: "1.0",
      };

      // Mobile handling
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "1920px";
        canvas.style.height = "1080px";
      }

      var unityInstance = null;

      // ==================== FULLSCREEN + 3CM BUFFER ====================
      document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
          container.classList.add('fullscreen-buffer');
          // Hide pause overlay when back in fullscreen
          pauseOverlay.style.display = "none";
        } else {
          container.classList.remove('fullscreen-buffer');
          // Show pause overlay when exiting fullscreen
          pauseOverlay.style.display = "flex";
        }
      });

      // Resume button - goes back to fullscreen
      resumeBtn.addEventListener("click", () => {
        if (canvas.requestFullscreen) {
          canvas.requestFullscreen();
        } else if (canvas.webkitRequestFullscreen) {
          canvas.webkitRequestFullscreen();
        } else if (canvas.msRequestFullscreen) {
          canvas.msRequestFullscreen();
        }
      });

      // ==================== START BUTTON ====================
      startBtn.addEventListener("click", function () {
        startBtn.style.display = "none";
        document.getElementById("custom-loading").style.display = "block";
        document.getElementById("custom-status").innerText = "Entering fullscreen & loading game...";

        // Enter fullscreen
        if (canvas.requestFullscreen) canvas.requestFullscreen();
        else if (canvas.webkitRequestFullscreen) canvas.webkitRequestFullscreen();

        // Load the game
        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            document.getElementById("custom-progress-fill").style.width = (progress * 100) + "%";
            document.getElementById("custom-status").innerText = "Loading... " + Math.floor(progress * 100) + "%";
          }).then((instance) => {
            unityInstance = instance;
            startOverlay.style.display = "none";
            document.querySelector("#unity-loading-bar").style.display = "none";
          }).catch((err) => {
            document.getElementById("custom-status").innerText = "Failed to load. Check console (F12).";
            console.error(err);
          });
        };
        document.body.appendChild(script);
      });

      window.onload = () => {
        document.getElementById("custom-status").innerText = "Ready! Click Play in Fullscreen";
      };
    </script>
  </body>
</html>
